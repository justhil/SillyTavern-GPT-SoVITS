# 与 luker 共用 docker_default
# docker compose -f docker-compose.stack.yml up -d --build

services:
  genie-tts:
    image: python:3.11-slim
    container_name: genie-tts
    restart: unless-stopped
    working_dir: /www/genie
    volumes:
      - ${GENIE_ROOT:-/www/genie}:/www/genie
    environment:
      - PYTHONUNBUFFERED=1
      - GENIE_DATA_DIR=/www/genie/GenieData
    command: >
      bash -c "
        if [ -x /www/genie/venv/bin/python ] && [ -f /www/genie/run_server.py ]; then
          exec /www/genie/venv/bin/python /www/genie/run_server.py;
        else
          pip install -q genie-tts && python -c \"
import os; os.environ.setdefault('GENIE_DATA_DIR','/www/genie/GenieData');
import genie_tts as g; g.start_server(host='0.0.0.0', port=8000, workers=1)\";
        fi
      "
    networks:
      - luker_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=8)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s

  tts-manager:
    build:
      context: .
      dockerfile: deploy/Dockerfile.tts-manager
    image: st-tts-manager:local
    container_name: tts-manager
    restart: unless-stopped
    depends_on:
      - genie-tts
    volumes:
      - ${TTS_ROOT:-/www/SillyTavern-GPT-SoVITS}:/app
      - ${GENIE_ROOT:-/www/genie}:/www/genie:ro
    environment:
      - PYTHONUNBUFFERED=1
      - GENIE_HOST=http://genie-tts:8000
      - SETTINGS_FILE=/app/system_settings.json
    entrypoint: ["/bin/sh", "/app/deploy/docker-entrypoint-tts.sh"]
    networks:
      - luker_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/ping', timeout=5)\""]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  luker_net:
    name: docker_default
    external: true