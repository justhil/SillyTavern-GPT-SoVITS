# 网关：宿主机 46938 → luker + /tts-mw → tts-manager
# 需先取消 luker 对 46938 的直连映射（见 vps-setup-st-gateway.sh）

services:
  st-gateway:
    image: nginx:alpine
    container_name: st-gateway
    restart: unless-stopped
    ports:
      - "0.0.0.0:46938:80"
    volumes:
      - ./st-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - luker_net
    depends_on:
      - tts-manager

networks:
  luker_net:
    name: docker_default
    external: true