server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    location = /tts-mw {
        return 301 $scheme://$host:$server_port/tts-mw/;
    }

    # 旧版 Admin 误请求 /api/admin → 仍进中间件（勿走 luker 403）
    location /api/admin/ {
        proxy_pass http://tts-manager:3000/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location /api/genie/ {
        proxy_pass http://tts-manager:3000/api/genie/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location /tts-mw/ {
        proxy_pass http://tts-manager:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /tts-mw;
        proxy_redirect ~^https?://[^/]+/(.*)$ $scheme://$http_host/tts-mw/$1;
        proxy_redirect ~^/(.*)$ $scheme://$http_host/tts-mw/$1;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://luker:2345;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}