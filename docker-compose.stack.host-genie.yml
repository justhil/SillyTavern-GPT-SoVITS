# Genie 跑在宿主机（systemd，默认 :8429），仅起 tts-manager
#
# docker compose -f docker-compose.stack.host-genie.yml up -d --build

services:
  tts-manager:
    build:
      context: .
      dockerfile: deploy/Dockerfile.tts-manager
    image: st-tts-manager:local
    container_name: tts-manager
    restart: unless-stopped
    volumes:
      - ${TTS_ROOT:-/www/SillyTavern-GPT-SoVITS}:/app
      - ${GENIE_ROOT:-/www/genie}:/www/genie:ro
    environment:
      - PYTHONUNBUFFERED=1
      - GENIE_HOST=http://172.17.0.1:8429
      - SETTINGS_FILE=/app/system_settings.json
      - TTS_MW_API_KEY=${TTS_MW_API_KEY:-}
    entrypoint: ["/bin/sh", "/app/deploy/docker-entrypoint-tts.sh"]
    networks:
      - luker_net

networks:
  luker_net:
    name: docker_default
    external: true